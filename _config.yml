name: "Gonzalez-Kozlova"
description: "This is the official web page for the Edgar Gonzalez-Kozlova"

url: "https://eegk.github.io/"

# GitHub Pages & Jekyll configuration
remote_theme: primer/github-pages-theme
plugins:
  - jekyll-github-metadata
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "news/page:num"

# Markup
permalink: pretty
highlighter: rouge
markdown: kramdown

# Explicit plugin configuration
github: [metadata]
